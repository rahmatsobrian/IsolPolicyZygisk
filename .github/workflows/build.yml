name: Build IsolPolicy Zygisk

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  MODULE_ID: isolpolicy_zygisk
  # nttld/setup-ndk pakai format revisi "rXXy" (r27c), BUKAN nomor
  # side-by-side "27.2.12479018" yang dipakai Gradle ndkVersion / SDK Manager.
  #
  # CATATAN: naik dari r27c ke r29 (rilis stabil terbaru per Juli 2026).
  # LSPlant memakai fitur C++23 yang sangat baru (lambda dengan static
  # operator(), lewat pola "decltype([] static {})" di hook_helper.hpp)
  # untuk membedakan hook callback statis vs non-statis. Clang 18.0.3 yang
  # dibawa NDK r27c punya bug pada deteksi ini: hasil pengecekan `requires`
  # salah, sehingga `backup(...)` dipanggil dengan tanda tangan yang salah
  # ("too many arguments to function call, expected 0, have 1" di
  # art_method.cxx). Ini murni bug toolchain (Clang), bukan bug kode kita
  # ataupun LSPlant — sudah dicoba pin ke berbagai commit LSPlant/master,
  # errornya tetap sama karena memang bug di kompilernya.
  # NDK r29 membawa Clang jauh lebih baru (clang-r563880c vs clang-r522817c
  # di r27c) dengan banyak fix terkait lambda/template/concepts C++ terbaru.
  # Kalau ternyata r29 masih kena bug yang sama, coba naik lagi ke r30 begitu
  # rilis stabilnya tersedia di https://github.com/android/ndk/releases.
  NDK_VERSION: "r29"

jobs:
  build-hooker-dex:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android cmdline-tools (buat d8)
        uses: android-actions/setup-android@v3

      - name: Install build-tools (d8 ada di sini)
        run: sdkmanager --install "build-tools;35.0.0"

      - name: Compile ProcessListHooker.java -> class -> dex
        run: |
          set -e
          BT="$ANDROID_HOME/build-tools/35.0.0"
          SRC=native/hooker_java/io/github/mhmrdd/isolationpolicy/hook/ProcessListHooker.java
          mkdir -p build/classes build/dex
          javac -d build/classes "$SRC"
          "$BT/d8" --output build/dex \
            build/classes/io/github/mhmrdd/isolationpolicy/hook/ProcessListHooker.class
          xxd -i build/dex/classes.dex > hooker_dex_gen.h
          # xxd menamai array `build_dex_classes_dex`, samakan nama dengan yang
          # dipakai native/src/hooker_dex.h (kHookerDex / kHookerDexLen)
          sed -i \
            -e 's/unsigned char build_dex_classes_dex\[\]/const unsigned char kHookerDex[]/' \
            -e 's/unsigned int build_dex_classes_dex_len/const unsigned int kHookerDexLen/' \
            hooker_dex_gen.h
          cp hooker_dex_gen.h native/src/hooker_dex.h

      - uses: actions/upload-artifact@v4
        with:
          name: hooker_dex_header
          path: native/src/hooker_dex.h

  build-native:
    needs: build-hooker-dex
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Cuma arm64-v8a: hook kita target system_server, yang di semua
        # device arm64 (termasuk vince/rolex) SELALU jalan sebagai proses
        # 64-bit, jadi build armeabi-v7a tidak pernah dipakai untuk modul
        # ini. Ini juga menghindari bug CMake Dobby di 32-bit arm
        # ("core/arch/Cpu.h" not found saat compile assembler-arm.cc).
        abi: [arm64-v8a]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: hooker_dex_header
          path: native/src

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}

      - name: Ensure Ninja is available
        run: command -v ninja || sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Configure & build (${{ matrix.abi }})
        run: |
          set -e
          cmake -S native -B build-${{ matrix.abi }} \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-29 \
            -DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=OFF \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build-${{ matrix.abi }} --target isolpolicy -j"$(nproc)"

      - uses: actions/upload-artifact@v4
        with:
          name: so-${{ matrix.abi }}
          path: build-${{ matrix.abi }}/libisolpolicy.so

  package:
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: so-arm64-v8a
          path: dl/arm64-v8a

      - name: Assemble module zip
        run: |
          set -e
          rm -rf out && mkdir -p out/module
          cp -r magisk_module/. out/module/
          mkdir -p out/module/zygisk
          cp dl/arm64-v8a/libisolpolicy.so out/module/zygisk/arm64-v8a.so
          rm -f out/module/zygisk/.gitkeep
          cd out/module && zip -r9 ../IsolPolicyZygisk.zip . -x '.git*'

      - uses: actions/upload-artifact@v4
        with:
          name: IsolPolicyZygisk-flashable
          path: out/IsolPolicyZygisk.zip
