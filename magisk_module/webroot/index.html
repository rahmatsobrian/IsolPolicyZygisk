<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>IsolPolicy (Zygisk)</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>IsolPolicy — Zygisk edition</h1>
  <div class="subtitle">Blokir jalur fork <code>useAppZygote</code> per-paket. Standalone, tanpa LSPosed.</div>

  <div class="card" id="statusCard">
    <div class="status-row">
      <span class="status-dot" id="reloadDot"></span>
      <span id="reloadText">Mengecek status reload…</span>
    </div>
    <div class="status-row">
      <span class="status-dot" id="selinuxDot"></span>
      <span id="selinuxText">Mengecek SELinux…</span>
    </div>
  </div>

  <div class="card">
    <input type="search" id="search" placeholder="Cari nama aplikasi / package" />
  </div>

  <div class="card" id="list">
    <div class="status">Memuat daftar aplikasi…</div>
  </div>

  <div class="card">
    <button id="apply">Simpan perubahan</button>
    <div class="status" id="applyStatus"></div>
  </div>

  <div class="card">
    <div class="section-title">Info SELinux / sepolicy</div>
    <div id="selinuxDetail" class="mono-block">memuat…</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
